<style>
/* Oculta la barra superior */
.goog-te-banner-frame.skiptranslate { 
  display: none !important; 
}
body { 
  top: 0 !important; 
}

/* Evita saltos por iframes */
html body .skiptranslate > iframe { 
  visibility: hidden !important; 
}

/* Contenedor del widget: lo queremos en DOM pero discreto */
.gtrans-slot { 
  width: 0; 
  height: 0; 
  overflow: hidden; 
}

/* Botón-bandera */
.nav-item.gtrans-flag { 
  display: flex; 
  align-items: center; 
}

.nav-item.gtrans-flag a {
  text-decoration: none;
  line-height: 1;
  padding: 0 .4rem;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* Imagen de bandera */
.nav-item.gtrans-flag img {
  width: 1.25rem;
  height: auto;
  display: block;
  border-radius: 2px;
}
</style>

<script>
// -------- Configuración de banderas --------
const FLAG_ASSETS = {
  es: {
    src: "/files/icons/flag-cl.svg",
    alt: "Español (Chile)",
    title: "Ver en español (Chile)"
  },
  en: {
    src: "/files/icons/flag-gb.svg",
    alt: "English (UK)",
    title: "View in English"
  }
};

// -------- Utilidades --------
function findRightNav() {
  const targets = document.querySelectorAll(
    '#quarto-header .navbar .navbar-nav.ms-auto, #quarto-header .navbar .navbar-nav:last-child'
  );
  for (const el of targets) if (el) return el;
  return null;
}

function currentLangFromCookie() {
  const m = document.cookie.match(/(?:^|;)\s*googtrans=([^;]+)/);
  if (!m) return 'es';
  const v = decodeURIComponent(m[1]).split('/');
  return v[v.length - 1] || 'es';
}

function renderFlagButton(targetLang) {
  const a = document.getElementById('gtrans-flag-toggle');
  if (!a) return;

  const flag = FLAG_ASSETS[targetLang];
  a.innerHTML = `<img src="${flag.src}" alt="${flag.alt}" aria-hidden="true">`;
  a.title = flag.title;
  a.setAttribute('aria-label', flag.title);
}

function updateFlag() {
  const current = currentLangFromCookie();

  // Muestra la bandera del idioma al que cambiarás al hacer click
  const next = (current === 'en') ? 'es' : 'en';
  renderFlagButton(next);
}

function setCookieAndReload(lang) {
  const val = `/auto/${lang}`;
  const d = new Date();
  d.setFullYear(d.getFullYear() + 1);

  const base = `googtrans=${val}; expires=${d.toUTCString()}; path=/`;
  const host = location.hostname;
  const root = '.' + host.replace(/^www\./, '');

  document.cookie = base;
  document.cookie = `${base}; domain=${host}`;
  document.cookie = `${base}; domain=${root}`;

  location.reload();
}

// -------- Inserta elementos en navbar --------
function ensureNavItems() {
  const right = findRightNav();
  if (!right) return false;

  // Botón de bandera
  if (!document.getElementById('gtrans-flag-toggle')) {
    const li = document.createElement('li');
    li.className = 'nav-item gtrans-flag';
    li.innerHTML = `<a id="gtrans-flag-toggle" title="Cambiar idioma"></a>`;
    right.appendChild(li);
  }

  // Contenedor oculto del widget
  if (!document.getElementById('google_translate_element')) {
    const li2 = document.createElement('li');
    li2.className = 'nav-item';
    li2.innerHTML = `<div id="google_translate_element" class="gtrans-slot"></div>`;
    right.appendChild(li2);
  }

  updateFlag();
  return true;
}

// -------- Cambiar idioma usando el combo del widget --------
function changeViaCombo(lang) {
  const combo = document.querySelector('select.goog-te-combo');
  if (!combo) return false;

  combo.value = lang;
  combo.dispatchEvent(new Event('change'));
  setTimeout(updateFlag, 700);
  return true;
}

// -------- Callback oficial de Google --------
function googleTranslateElementInit() {
  new google.translate.TranslateElement(
    {
      pageLanguage: 'es',
      includedLanguages: 'es,en',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
    },
    'google_translate_element'
  );

  const tryWire = () => {
    ensureNavItems();
    updateFlag();

    const btn = document.getElementById('gtrans-flag-toggle');
    if (btn && !btn._wired) {
      btn._wired = true;
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        const current = currentLangFromCookie();
        const next = (current === 'en') ? 'es' : 'en';

        // 1) Intento directo con el combo
        if (!changeViaCombo(next)) {
          // 2) Fallback robusto
          setCookieAndReload(next);
        }
      });
    }
  };

  let tries = 0;
  const t = setInterval(() => {
    tries++;
    tryWire();
    if (document.querySelector('select.goog-te-combo') || tries > 30) {
      clearInterval(t);
    }
  }, 200);
}

// Exponer callback global
window.googleTranslateElementInit = googleTranslateElementInit;

// Primer pintado de navbar
document.addEventListener('DOMContentLoaded', () => {
  ensureNavItems();
  updateFlag();
});
</script>

<!-- Carga la librería con callback -->
<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
